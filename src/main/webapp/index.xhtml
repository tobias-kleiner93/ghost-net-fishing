<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:head>
    <title>Ghost Net Fishing</title>
</h:head>

<h:body>

    <h1>Ghost Net Fishing</h1>

    <h2>Geisternetz melden</h2>
    
    <h:outputText value="#{ghostNetBean.meldung}"
              rendered="#{not empty ghostNetBean.meldung}" />

    <h:form>

        <p>
            Breitengrad:
            <h:inputText value="#{ghostNetBean.breitengrad}" />
        </p>

        <p>
            Längengrad:
            <h:inputText value="#{ghostNetBean.laengengrad}" />
        </p>

        <p>
            Größe:
            <h:inputText value="#{ghostNetBean.groesse}" />
        </p>

        <p>
            <h:commandButton value="Geisternetz melden"
                             action="#{ghostNetBean.speichern}" />
        </p>

    </h:form>

</h:body>

</html>
